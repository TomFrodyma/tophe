# The whole app, self-hosted: `./install.sh` (recommended) or `docker compose up -d --build`.
# For app development on the host, start just the backing services instead:
#   docker compose up -d postgres minio
services:
    app:
        build:
            context: .
            args:
                NEXT_PUBLIC_SAAS_URL: ${NEXT_PUBLIC_SAAS_URL:-http://localhost:3000}
        restart: unless-stopped
        ports:
            - "${APP_PORT:-3000}:3000"
        env_file:
            - path: .env
              required: false
        environment:
            DATABASE_URL: postgresql://postgres:postgres@postgres:5432/tophe
            NEXT_PUBLIC_SAAS_URL: ${NEXT_PUBLIC_SAAS_URL:-http://localhost:3000}
            STORAGE_VOLUME_PATH: /data
            # Avatars: the browser talks to MinIO directly via presigned URLs,
            # so the endpoint is the host-visible one.
            S3_ENDPOINT: ${S3_ENDPOINT:-http://localhost:9000}
            S3_REGION: ${S3_REGION:-us-east-1}
            S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-minioadmin}
            S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-minioadmin}
            NEXT_PUBLIC_AVATARS_BUCKET_NAME: ${NEXT_PUBLIC_AVATARS_BUCKET_NAME:-avatars}
        volumes:
            - app_data:/data
        extra_hosts:
            # Lets the container reach a model server on the host machine
            # (e.g. Ollama at host.docker.internal:11434).
            - "host.docker.internal:host-gateway"
        depends_on:
            postgres:
                condition: service_healthy
        healthcheck:
            test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:3000/api/health"]
            interval: 10s
            timeout: 5s
            retries: 30

    # Fires the app's scheduled endpoints (journal nudge, calendar reminders,
    # daily briefing). All three are idempotent, so a simple 5-minute loop is
    # enough - no crond needed.
    cron:
        image: curlimages/curl:latest
        restart: unless-stopped
        depends_on:
            app:
                condition: service_healthy
        environment:
            CRON_SECRET: ${CRON_SECRET:-}
        entrypoint:
            - /bin/sh
            - -c
            - |
                while true; do
                  sleep 300
                  for p in daily-reminder calendar-reminders briefing; do
                    curl -fsS -m 60 -X POST -H "Authorization: Bearer $$CRON_SECRET" "http://app:3000/api/cron/$$p" >/dev/null 2>&1 || true
                  done
                done

    postgres:
        image: postgres:16-alpine
        restart: unless-stopped
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
            POSTGRES_DB: tophe
        # Bound to localhost only: the app reaches Postgres over the internal
        # compose network, so this port exists purely for host-side dev tools.
        # Never publish it on 0.0.0.0 (Docker punches through the host firewall).
        ports:
            - "127.0.0.1:${DB_PORT:-5432}:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U postgres"]
            interval: 10s
            timeout: 5s
            retries: 5

    minio:
        image: minio/minio:latest
        restart: unless-stopped
        command: server /data --console-address ":9001"
        environment:
            MINIO_ROOT_USER: minioadmin
            MINIO_ROOT_PASSWORD: minioadmin
        # Localhost only. The S3 API (9000) is reachable from the browser for
        # presigned avatar URLs on a local install; the console (9001) is a
        # dev convenience. Neither should ever be on 0.0.0.0.
        ports:
            - "127.0.0.1:${MINIO_PORT:-9000}:9000"
            - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"
        volumes:
            - minio_data:/data
        healthcheck:
            test: ["CMD", "mc", "ready", "local"]
            interval: 10s
            timeout: 5s
            retries: 5

    # Creates the default bucket on startup
    minio-setup:
        image: minio/mc:latest
        depends_on:
            minio:
                condition: service_healthy
        entrypoint: >
            /bin/sh -c "
            mc alias set local http://minio:9000 minioadmin minioadmin;
            mc mb local/avatars --ignore-existing;
            mc anonymous set download local/avatars;
            echo 'Bucket setup complete';
            exit 0;
            "

volumes:
    app_data:
    postgres_data:
    minio_data:
